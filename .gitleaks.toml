# Gitleaks configuration for RocketRide
# Extends default rules (AWS, GCP, Stripe, GitHub, etc.)
# Adds custom rules for .pipe pipeline files with embedded API keys

[extend]
useDefault = true

# Custom rule: detect hardcoded API keys in .pipe pipeline files
[[rules]]
id = "pipe-file-api-key"
description = "Hardcoded API key in .pipe pipeline file"
regex = '''(?i)"(apikey|api_key|secret|token|password|auth)"\s*:\s*"([^"]{8,})"'''
secretGroup = 2
keywords = ["apikey", "api_key", "secret", "token", "password", "auth"]
paths = ['''\.pipe$''']

    [rules.allowlist]
    regexes = [
        '''\$[A-Z_]+''',
        '''\$\{[A-Z_]+\}''',
    ]
    paths = [
        '''testdata/''',
        '''test/fixtures/''',
    ]

# Custom rule: detect hardcoded keys in services.json node configs
[[rules]]
id = "services-json-api-key"
description = "Hardcoded API key in node services.json config"
regex = '''(?i)"(apikey|api_key|secret_key|access_key)"\s*:\s*"([^"]{16,})"'''
secretGroup = 2
keywords = ["apikey", "api_key", "secret_key", "access_key"]
paths = ['''services.*\.json$''']

    [rules.allowlist]
    regexes = [
        '''\$[A-Z_]+''',
        '''\$\{[A-Z_]+\}''',
    ]
    paths = [
        '''testdata/''',
        '''test/fixtures/''',
    ]

# Global allowlist — skip only lock files, generated output, and tooling config
# NOTE: Directories like docs/, testdata/, test/fixtures/ are handled per-rule above
# to avoid blanket-excluding paths that could hide real secrets
[allowlist]
paths = [
    '''pnpm-lock\.yaml''',
    '''package-lock\.json''',
    '''\.gitleaks\.toml''',
    '''node_modules/''',
    '''\.venv/''',
    '''vendor/''',
]
regexes = [
    # Placeholder / example secret values — match only when the value itself is a known placeholder
    # Requires the placeholder word to appear as the assigned value (after = or : or quotes)
    '''(?i)(?:password|apikey|api_key|secret|token|auth)\s*[=:]\s*["']?(?:changeme|placeholder|example[-_]?(?:key|token|secret|password)?|dummy[-_]?(?:key|token|secret|password)?|fake[-_]?(?:key|token|secret|password)?|xxxx+|your[-_]?(?:key|token|secret|password|api[-_]?key))["']?''',
    # GitHub Actions expression syntax (not real secrets)
    '''\$\{\{.*\}\}''',
]
