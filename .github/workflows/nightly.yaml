name: Nightly prerelease
run-name: Nightly ${{ github.event_name == 'workflow_dispatch' && '(manual)' || '(scheduled)' }}

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  init:
    name: Initialize
    uses: ./.github/workflows/_init.yaml
  build:
    name: Build
    needs: init
    uses: ./.github/workflows/_build.yaml
    with:
      full_version: ${{ needs.init.outputs.full_server_version }}
      build_hash: ${{ needs.init.outputs.build_hash }}
      build_stamp: ${{ needs.init.outputs.build_stamp }}
      package: true
      retention_days: 3
    secrets: inherit

  cleanup-prereleases:
    name: Clean up prereleases
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Delete existing prerelease tags and releases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAGS=$(git tag -l '*-prerelease')
          if [ -z "$TAGS" ]; then
            echo "No prerelease tags found"
            exit 0
          fi

          for TAG in $TAGS; do
            echo "Deleting release for ${TAG}..."
            gh release delete "${TAG}" --yes 2>/dev/null || echo "  No release for ${TAG}"
            echo "Deleting remote tag ${TAG}..."
            git push origin --delete "${TAG}" 2>/dev/null || echo "  Remote tag ${TAG} not found"
            echo "Deleting local tag ${TAG}..."
            git tag -d "${TAG}" 2>/dev/null || echo "  Local tag ${TAG} not found"
          done
        env:
          GH_TOKEN: ${{ github.token }}

  prerelease:
    name: Prerelease
    needs: [init, build, cleanup-prereleases]
    uses: ./.github/workflows/_release.yaml
    with:
      prerelease: true
      server_version: ${{ needs.init.outputs.server_version }}
      vscode_version: ${{ needs.init.outputs.vscode_version }}
      client_mcp_version: ${{ needs.init.outputs.client_mcp_version }}
      client_python_version: ${{ needs.init.outputs.client_python_version }}
      client_typescript_version: ${{ needs.init.outputs.client_typescript_version }}
    secrets: inherit

  docker:
    name: Publish Docker prerelease image
    needs: [init, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download server artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: server-artifacts-ubuntu
          path: release-assets

      - name: Extract server
        run: |
          mkdir -p dist/server
          tar xf release-assets/rocketride-server-*-linux-x64.tar.gz -C dist/server
          if [ ! -f dist/server/engine ]; then
            echo "::error::Engine binary not found after extraction"
            ls -la dist/server/
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile.engine
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/rocketride-engine:${{ needs.init.outputs.server_version }}-prerelease
