name: Nightly prerelease
run-name: Nightly ${{ github.event_name == 'workflow_dispatch' && '(manual)' || '(scheduled)' }}

concurrency:
  group: nightly
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  init:
    name: Initialize versions
    runs-on: ubuntu-latest
    outputs:
      server_version: ${{ steps.init.outputs.server_version }}
      vscode_version: ${{ steps.init.outputs.vscode_version }}
      client_mcp_version: ${{ steps.init.outputs.client_mcp_version }}
      client_python_version: ${{ steps.init.outputs.client_python_version }}
      client_typescript_version: ${{ steps.init.outputs.client_typescript_version }}
      full_server_version: ${{ steps.init.outputs.full_server_version }}
      build_hash: ${{ steps.init.outputs.build_hash }}
      build_stamp: ${{ steps.init.outputs.build_stamp }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Extract versions
        id: init
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "server_version=$VERSION" >> $GITHUB_OUTPUT
          echo "vscode_version=$(jq -r '.version' apps/vscode/package.json)" >> $GITHUB_OUTPUT
          echo "client_mcp_version=$(yq -r '.project.version' packages/client-mcp/pyproject.toml)" >> $GITHUB_OUTPUT
          echo "client_python_version=$(yq -r '.project.version' packages/client-python/pyproject.toml)" >> $GITHUB_OUTPUT
          echo "client_typescript_version=$(jq -r '.version' packages/client-typescript/package.json)" >> $GITHUB_OUTPUT
          echo "full_server_version=$VERSION.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "build_hash=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "build_stamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT
  build:
    name: Build / ${{ matrix.label }}
    needs: init
    timeout-minutes: 90
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ github.token }}
      VCPKG_NUGET_USER: ${{ github.repository_owner }}
      NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      VCPKG_BINARY_SOURCES: clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            label: Ubuntu 22.04
            runner: ubuntu-22.04
            builder_cmd: ./builder
            vcpkg_cmd: ./build/vcpkg/vcpkg
          - platform: windows
            label: Windows Server 2022
            runner: windows-2022
            builder_cmd: ./builder.cmd
            vcpkg_cmd: ./build/vcpkg/vcpkg.exe
          - platform: macos
            label: macOS (ARM64)
            runner: macos-14
            builder_cmd: ./builder
            vcpkg_cmd: ./build/vcpkg/vcpkg
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Set up pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10
      - name: Set up vcpkg
        run: ${{ matrix.builder_cmd }} vcpkg:submodule-build
      - name: Set up vcpkg nuget / Linux/macOS
        if: matrix.platform != 'windows'
        run: |
          NUGET_EXE=$(${{ matrix.vcpkg_cmd }} fetch nuget | tail -n1)
          mono $NUGET_EXE sources add \
            -Source "${{ env.NUGET_FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "${{ env.VCPKG_NUGET_USER }}" \
            -Password "${{ secrets.GITHUB_TOKEN }}" || true
          mono $NUGET_EXE setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.NUGET_FEED_URL }}"
      - name: Set up vcpkg nuget / Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $NUGET_EXE = $(${{ matrix.vcpkg_cmd }} fetch nuget | Select-Object -Last 1)
          & $NUGET_EXE sources add `
            -Source "${{ env.NUGET_FEED_URL }}" `
            -StorePasswordInClearText `
            -Name GitHubPackages `
            -UserName "${{ env.VCPKG_NUGET_USER }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}"
          & $NUGET_EXE setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "${{ env.NUGET_FEED_URL }}"

      - name: Build
        run: ${{ matrix.builder_cmd }} build --verbose --autoinstall --version=${{ needs.init.outputs.full_server_version }} --hash=${{ needs.init.outputs.build_hash }} --stamp=${{ needs.init.outputs.build_stamp }}

      - name: Test
        run: ${{ matrix.builder_cmd }} test --verbose

      - name: Package
        run: ${{ matrix.builder_cmd }} package --verbose

      - name: Upload server artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-artifacts-${{ matrix.platform }}
          retention-days: 3
          path: |
            ${{ github.workspace }}/dist/artifacts/*.zip
            ${{ github.workspace }}/dist/artifacts/*.tar.gz
            ${{ github.workspace }}/dist/artifacts/*.json
          if-no-files-found: error

      - name: Upload VS Code extension
        if: matrix.platform == 'ubuntu'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vscode-artifacts
          retention-days: 3
          path: ${{ github.workspace }}/dist/vscode/*.vsix
          if-no-files-found: error

      - name: Upload MCP client
        if: matrix.platform == 'ubuntu'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mcp-client-artifacts
          retention-days: 3
          path: |
            ${{ github.workspace }}/dist/clients/mcp/*.whl
            ${{ github.workspace }}/dist/clients/mcp/*.tar.gz
          if-no-files-found: error

      - name: Upload Python client
        if: matrix.platform == 'ubuntu'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-client-artifacts
          retention-days: 3
          path: |
            ${{ github.workspace }}/dist/clients/python/*.whl
            ${{ github.workspace }}/dist/clients/python/*.tar.gz
          if-no-files-found: error

      - name: Upload TypeScript client
        if: matrix.platform == 'ubuntu'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: typescript-client-artifacts
          retention-days: 3
          path: ${{ github.workspace }}/dist/clients/typescript/*.tgz
          if-no-files-found: error

  cleanup-prereleases:
    name: Clean up prereleases
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Delete existing prerelease tags and releases
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAGS=$(git tag -l '*-prerelease')
          if [ -z "$TAGS" ]; then
            echo "No prerelease tags found"
            exit 0
          fi

          for TAG in $TAGS; do
            echo "Deleting release for ${TAG}..."
            gh release delete "${TAG}" --yes 2>/dev/null || echo "  No release for ${TAG}"
            echo "Deleting remote tag ${TAG}..."
            git push origin --delete "${TAG}" 2>/dev/null || echo "  Remote tag ${TAG} not found"
            echo "Deleting local tag ${TAG}..."
            git tag -d "${TAG}" 2>/dev/null || echo "  Local tag ${TAG} not found"
          done
        env:
          GH_TOKEN: ${{ github.token }}

  prerelease:
    name: Prerelease / ${{ matrix.name }}
    needs: [init, build, cleanup-prereleases]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: server
            name: Server
            version: ${{ needs.init.outputs.server_version }}
            tag_name: server-v${{ needs.init.outputs.server_version }}-prerelease
            download_pattern: server-artifacts-*
          - type: client-typescript
            name: TypeScript Client
            version: ${{ needs.init.outputs.client_typescript_version }}
            tag_name: client-typescript-v${{ needs.init.outputs.client_typescript_version }}-prerelease
            download_pattern: typescript-client-artifacts
          - type: client-python
            name: Python Client
            version: ${{ needs.init.outputs.client_python_version }}
            tag_name: client-python-v${{ needs.init.outputs.client_python_version }}-prerelease
            download_pattern: python-client-artifacts
          - type: client-mcp
            name: MCP Client
            version: ${{ needs.init.outputs.client_mcp_version }}
            tag_name: client-mcp-v${{ needs.init.outputs.client_mcp_version }}-prerelease
            download_pattern: mcp-client-artifacts
          - type: vscode
            name: VS Code Extension
            version: ${{ needs.init.outputs.vscode_version }}
            tag_name: vscode-v${{ needs.init.outputs.vscode_version }}-prerelease
            download_pattern: vscode-artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ${{ matrix.download_pattern }}
          merge-multiple: true
          path: release-assets

      - name: List artifacts
        run: find release-assets -type f | sort

      - name: Create or update prerelease tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ matrix.tag_name }}"
          git push -f origin "${{ matrix.tag_name }}"

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ matrix.tag_name }}
          name: RocketRide ${{ matrix.name }} v${{ matrix.version }} (prerelease)
          prerelease: true
          generate_release_notes: false
          body: |
            Automated nightly prerelease from `develop`.

            **${{ matrix.name }}** v${{ matrix.version }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Publish Docker prerelease image
    needs: [init, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download server artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: server-artifacts-ubuntu
          path: release-assets

      - name: Extract server
        run: |
          mkdir -p dist/server
          tar xf release-assets/rocketride-server-*-linux-x64.tar.gz -C dist/server
          if [ ! -f dist/server/engine ]; then
            echo "::error::Engine binary not found after extraction"
            ls -la dist/server/
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile.engine
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/rocketride-engine:${{ needs.init.outputs.server_version }}-prerelease
