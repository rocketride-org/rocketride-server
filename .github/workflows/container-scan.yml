name: Container Scan

on:
  push:
    branches: [develop, main, 'release/**']
    paths:
      - 'docker/**'
  pull_request:
    branches: [develop, main, 'release/**']
    paths:
      - 'docker/**'
  schedule:
    - cron: '42 3 * * 1'  # Weekly Monday 3:42 UTC

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - Dockerfile.engine
          - Dockerfile.eaas
          - Dockerfile.overlay
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy (filesystem scan)
        run: |
          trivy fs docker/${{ matrix.dockerfile }} \
            --format sarif \
            --output trivy-${{ matrix.dockerfile }}.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.dockerfile }}.sarif'
          category: 'trivy-${{ matrix.dockerfile }}'
