name: Release
run-name: Release from ${{ github.sha }}

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  init:
    name: Initialize
    uses: ./.github/workflows/_init.yaml
    with:
      check_server_tag: true

  build:
    name: Build
    needs: init
    uses: ./.github/workflows/_build.yaml
    permissions:
      contents: read
      packages: write
    with:
      full_version: ${{ needs.init.outputs.full_server_version }}
      build_hash: ${{ needs.init.outputs.build_hash }}
      build_stamp: ${{ needs.init.outputs.build_stamp }}
      package: true
    secrets: inherit

  publish:
    name: Publish / ${{ matrix.name }}
    needs: [init, build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: server
            name: Server
            version: ${{ needs.init.outputs.server_version }}
            tag_name: server-v${{ needs.init.outputs.server_version }}
            download_pattern: server-artifacts-*
          - type: client-typescript
            name: TypeScript Client
            version: ${{ needs.init.outputs.client_typescript_version }}
            tag_name: client-typescript-v${{ needs.init.outputs.client_typescript_version }}
            download_pattern: typescript-client-artifacts
          - type: client-python
            name: Python Client
            version: ${{ needs.init.outputs.client_python_version }}
            tag_name: client-python-v${{ needs.init.outputs.client_python_version }}
            download_pattern: python-client-artifacts
          - type: client-mcp
            name: MCP Client
            version: ${{ needs.init.outputs.client_mcp_version }}
            tag_name: client-mcp-v${{ needs.init.outputs.client_mcp_version }}
            download_pattern: mcp-client-artifacts
          - type: vscode
            name: VS Code Extension
            version: ${{ needs.init.outputs.vscode_version }}
            tag_name: vscode-v${{ needs.init.outputs.vscode_version }}
            download_pattern: vscode-artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "${{ matrix.tag_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ matrix.tag_name }} already exists — skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download artifacts
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ${{ matrix.download_pattern }}
          merge-multiple: true
          path: release-assets

      - name: List artifacts
        if: steps.tag_check.outputs.exists == 'false'
        run: find release-assets -type f | sort

      # --- npm: rocketride ---
      - name: Set up Node.js
        if: steps.tag_check.outputs.exists == 'false' && matrix.type == 'client-typescript'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false' && matrix.type == 'client-typescript'
        run: |
          VERSION="${{ matrix.version }}"
          if npm view "rocketride@${VERSION}" version 2>/dev/null; then
            echo "rocketride@${VERSION} already exists on npm — skipping"
          else
            TARBALL=$(find release-assets -name '*.tgz' | head -n1)
            echo "Publishing ${TARBALL}"
            npm publish "./${TARBALL}" --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- PyPI: rocketride ---
      - name: Set up Python
        if: steps.tag_check.outputs.exists == 'false' && (matrix.type == 'client-python' || matrix.type == 'client-mcp')
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Publish rocketride to PyPI
        if: steps.tag_check.outputs.exists == 'false' && matrix.type == 'client-python'
        run: |
          pip install twine
          VERSION="${{ matrix.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/rocketride/${VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "rocketride==${VERSION} already exists on PyPI — skipping"
          else
            twine upload release-assets/*.whl release-assets/*.tar.gz
          fi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      # --- PyPI: rocketride-mcp ---
      - name: Publish rocketride-mcp to PyPI
        if: steps.tag_check.outputs.exists == 'false' && matrix.type == 'client-mcp'
        run: |
          pip install twine
          VERSION="${{ matrix.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/rocketride-mcp/${VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "rocketride-mcp==${VERSION} already exists on PyPI — skipping"
          else
            twine upload release-assets/*.whl release-assets/*.tar.gz
          fi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      # --- VS Code Marketplace + Open VSX ---
      - name: Set up Node.js for vsce
        if: steps.tag_check.outputs.exists == 'false' && matrix.type == 'vscode'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Publish to VS Code Marketplace
        if: steps.tag_check.outputs.exists == 'false' && matrix.type == 'vscode'
        run: |
          npm install -g @vscode/vsce
          VSIX=$(find release-assets -name '*.vsix' | head -n1)
          echo "Publishing ${VSIX}"
          OUTPUT=$(vsce publish --packagePath "${VSIX}" 2>&1) && exit 0
          if echo "$OUTPUT" | grep -qi "already exists"; then
            echo "Version already exists on Marketplace — skipping"
          else
            echo "$OUTPUT"
            exit 1
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: steps.tag_check.outputs.exists == 'false' && matrix.type == 'vscode'
        run: |
          npm install -g ovsx
          VSIX=$(find release-assets -name '*.vsix' | head -n1)
          echo "Publishing ${VSIX}"
          OUTPUT=$(ovsx publish "${VSIX}" -p "$OVSX_PAT" 2>&1) && exit 0
          if echo "$OUTPUT" | grep -qi "already exists"; then
            echo "Version already exists on Open VSX — skipping"
          else
            echo "$OUTPUT"
            exit 1
          fi
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # --- Create tag and GitHub Release ---
      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ matrix.tag_name }}"
          git push origin "${{ matrix.tag_name }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ matrix.tag_name }}
          name: RocketRide ${{ matrix.name }} v${{ matrix.version }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Publish Docker image
    needs: [init, publish]
    if: needs.init.outputs.server_tag_exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download server artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: server-artifacts-ubuntu
          path: release-assets

      - name: Extract server
        run: |
          mkdir -p dist/server
          tar xf release-assets/rocketride-server-*-linux-x64.tar.gz -C dist/server
          if [ ! -f dist/server/engine ]; then
            echo "::error::Engine binary not found after extraction"
            ls -la dist/server/
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: docker/Dockerfile.engine
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/rocketride-engine:${{ needs.init.outputs.server_version }}
            ghcr.io/${{ github.repository_owner }}/rocketride-engine:latest
