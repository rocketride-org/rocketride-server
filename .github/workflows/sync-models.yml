name: Sync LLM Models

on:
  schedule:
    - cron: '0 5 * * 1' # Mondays 05:00 UTC
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sync-models-${{ hashFiles('tools/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sync-models-

      - name: Install sync script dependencies
        run: pip install -r tools/requirements.txt

      - name: Run model sync (dry run first — fail fast if script errors)
        run: python tools/src/sync_models.py --all
        env:
          ROCKETRIDE_OPENAI_KEY: ${{ secrets.ROCKETRIDE_OPENAI_KEY }}
          ROCKETRIDE_ANTHROPIC_KEY: ${{ secrets.ROCKETRIDE_ANTHROPIC_KEY }}
          ROCKETRIDE_GEMINI_KEY: ${{ secrets.ROCKETRIDE_GEMINI_KEY }}
          ROCKETRIDE_MISTRAL_KEY: ${{ secrets.ROCKETRIDE_MISTRAL_KEY }}
          ROCKETRIDE_DEEPSEEK_KEY: ${{ secrets.ROCKETRIDE_DEEPSEEK_KEY }}
          ROCKETRIDE_XAI_KEY: ${{ secrets.ROCKETRIDE_XAI_KEY }}
          ROCKETRIDE_PERPLEXITY_KEY: ${{ secrets.ROCKETRIDE_PERPLEXITY_KEY }}
          ROCKETRIDE_QWEN_KEY: ${{ secrets.ROCKETRIDE_QWEN_KEY }}

      - name: Apply model sync and capture PR body
        run: python tools/src/sync_models.py --all --apply --pr-body
        env:
          ROCKETRIDE_OPENAI_KEY: ${{ secrets.ROCKETRIDE_OPENAI_KEY }}
          ROCKETRIDE_ANTHROPIC_KEY: ${{ secrets.ROCKETRIDE_ANTHROPIC_KEY }}
          ROCKETRIDE_GEMINI_KEY: ${{ secrets.ROCKETRIDE_GEMINI_KEY }}
          ROCKETRIDE_MISTRAL_KEY: ${{ secrets.ROCKETRIDE_MISTRAL_KEY }}
          ROCKETRIDE_DEEPSEEK_KEY: ${{ secrets.ROCKETRIDE_DEEPSEEK_KEY }}
          ROCKETRIDE_XAI_KEY: ${{ secrets.ROCKETRIDE_XAI_KEY }}
          ROCKETRIDE_PERPLEXITY_KEY: ${{ secrets.ROCKETRIDE_PERPLEXITY_KEY }}
          ROCKETRIDE_QWEN_KEY: ${{ secrets.ROCKETRIDE_QWEN_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'chore(models): sync LLM model lists'
          base: develop
          branch: chore/sync-models
          commit-message: 'chore(models): sync LLM model lists'
          delete-branch: true
          body: ${{ env.SYNC_OUTPUT }}
          labels: |
            automated
            models
