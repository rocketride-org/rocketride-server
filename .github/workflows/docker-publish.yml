name: Docker Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Server version to package (e.g. 1.0.3)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push engine image
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'server-v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=server-v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.event.release.tag_name }}"
            echo "version=${TAG#server-v}" >> $GITHUB_OUTPUT
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Download server artifact
        run: |
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern "*linux*x64*" \
            --dir /tmp/release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract server
        run: |
          mkdir -p dist/server
          tar xf /tmp/release/*linux*x64* -C dist/server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.engine
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/rocketride-engine:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/rocketride-engine:latest
