name: CI
run-name: ${{ github.event.pull_request.title || github.event.head_commit.message }} ${{ (github.event_name == 'workflow_dispatch' && github.ref_name) || '' }} ${{ github.event_name == 'merge_group' && 'merge queue' || '' }}

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [develop, main, 'release/**']
  pull_request:
    branches: [develop, main, 'release/**']
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: '17 4 * * 1' # Weekly Monday 4:17 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}
  VCPKG_NUGET_USER: ${{ github.repository_owner }}
  NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite

# ---------------------------------------------------------------------------
#  Build
# ---------------------------------------------------------------------------
jobs:
  init:
    name: Initialize
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      server_version: ${{ steps.vars.outputs.server_version }}
      vscode_version: ${{ steps.vars.outputs.vscode_version }}
      client_mcp_version: ${{ steps.vars.outputs.client_mcp_version }}
      client_python_version: ${{ steps.vars.outputs.client_python_version }}
      client_typescript_version: ${{ steps.vars.outputs.client_typescript_version }}
      full_server_version: ${{ steps.vars.outputs.full_server_version }}
      build_hash: ${{ steps.vars.outputs.build_hash }}
      build_stamp: ${{ steps.vars.outputs.build_stamp }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up variables
        id: vars
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "server_version=$VERSION" >> $GITHUB_OUTPUT
          echo "vscode_version=$(jq -r '.version' apps/vscode/package.json)" >> $GITHUB_OUTPUT
          echo "client_mcp_version=$(yq -r '.project.version' packages/client-mcp/pyproject.toml)" >> $GITHUB_OUTPUT
          echo "client_python_version=$(yq -r '.project.version' packages/client-python/pyproject.toml)" >> $GITHUB_OUTPUT
          echo "client_typescript_version=$(jq -r '.version' packages/client-typescript/package.json)" >> $GITHUB_OUTPUT
          echo "full_server_version=$VERSION.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "build_hash=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "build_stamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT
  build:
    name: Build / ${{ matrix.label }}
    needs: init
    if: github.event_name != 'schedule'
    timeout-minutes: 90
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            label: Ubuntu 22.04
            runner: ubuntu-22.04
            builder_cmd: ./builder
            vcpkg_cmd: ./build/vcpkg/vcpkg
          - platform: windows
            label: Windows Server 2022
            runner: windows-2022
            builder_cmd: ./builder.cmd
            vcpkg_cmd: ./build/vcpkg/vcpkg.exe
          - platform: macos
            label: macOS (ARM64)
            runner: macos-14
            builder_cmd: ./builder
            vcpkg_cmd: ./build/vcpkg/vcpkg
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Set up pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10
      - name: Set up vcpkg
        run: ${{ matrix.builder_cmd }} vcpkg:submodule-build
      - name: Set up vcpkg nuget / Linux/macOS
        if: matrix.platform != 'windows'
        run: |
          NUGET_EXE=$(${{ matrix.vcpkg_cmd }} fetch nuget | tail -n1)
          mono $NUGET_EXE sources add \
            -Source "${{ env.NUGET_FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "${{ env.VCPKG_NUGET_USER }}" \
            -Password "${{ secrets.GITHUB_TOKEN }}" || true
          mono $NUGET_EXE setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.NUGET_FEED_URL }}"
      - name: Set up vcpkg nuget / Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $NUGET_EXE = $(${{ matrix.vcpkg_cmd }} fetch nuget | Select-Object -Last 1)
          & $NUGET_EXE sources add `
            -Source "${{ env.NUGET_FEED_URL }}" `
            -StorePasswordInClearText `
            -Name GitHubPackages `
            -UserName "${{ env.VCPKG_NUGET_USER }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}"
          & $NUGET_EXE setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "${{ env.NUGET_FEED_URL }}"

      - name: Build
        run: ${{ matrix.builder_cmd }} build --verbose --autoinstall --version=${{ needs.init.outputs.full_server_version }} --build-hash=${{ needs.init.outputs.build_hash }} --build-stamp=${{ needs.init.outputs.build_stamp }}

      - name: Test
        run: ${{ matrix.builder_cmd }} test --verbose

  # ---------------------------------------------------------------------------
  #  CodeQL — scheduled + push only (not on PRs to avoid blocking releases)
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL / ${{ matrix.language }}
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          category: '/language:${{ matrix.language }}'

  codeql-cpp:
    name: CodeQL / cpp
    if: github.event_name == 'schedule'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    continue-on-error: true
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      VCPKG_NUGET_USER: ${{ github.repository_owner }}
      NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      VCPKG_BINARY_SOURCES: clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Bootstrap vcpkg
        run: ./builder vcpkg:build

      - name: Configure vcpkg NuGet cache
        run: |
          NUGET_EXE=$(./build/vcpkg/vcpkg fetch nuget | tail -n1)
          mono $NUGET_EXE sources add \
            -Source "${{ env.NUGET_FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "${{ env.VCPKG_NUGET_USER }}" \
            -Password "${{ secrets.GITHUB_TOKEN }}" || true
          mono $NUGET_EXE setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.NUGET_FEED_URL }}"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          languages: cpp
          build-mode: manual
          queries: security-and-quality

      - name: Skip prebuilt download
        run: |
          mkdir -p build
          echo '{"server":{"compiledVersion":"codeql"}}' > build/state.json

      - name: Build C++
        run: ./builder server:build --verbose --autoinstall

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          category: '/language:cpp'

  # ---------------------------------------------------------------------------
  #  Container scan
  # ---------------------------------------------------------------------------
  container-scan:
    name: Container scan / ${{ matrix.dockerfile }}
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - Dockerfile.engine
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy (filesystem scan)
        run: |
          trivy fs docker/${{ matrix.dockerfile }} \
            --format sarif \
            --output trivy-${{ matrix.dockerfile }}.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.dockerfile }}.sarif'
          category: 'trivy-${{ matrix.dockerfile }}'
