name: CI
run-name: ${{ github.event.pull_request.title || github.event.head_commit.message }} ${{ (github.event_name == 'workflow_dispatch' && github.ref_name) || '' }} ${{ github.event_name == 'merge_group' && 'merge queue' || '' }}

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [develop, main, 'release/**']
  pull_request:
    branches: [develop, main, 'release/**']
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: '17 4 * * 1' # Weekly Monday 4:17 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}
  VCPKG_NUGET_USER: ${{ github.repository_owner }}
  NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite

# ---------------------------------------------------------------------------
#  Build
# ---------------------------------------------------------------------------
jobs:
  init:
    name: Initialize
    uses: ./.github/workflows/_init.yaml

  # Skip build entirely for docs-only PRs (no code changed).
  # For all code changes, builder handles engine download-vs-compile
  # internally via hash comparison with nightly builds.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'nodes/**'
              - 'apps/**'
              - 'scripts/**'
              - 'builder'
              - 'builder.cmd'
              - '.github/workflows/**'

  build:
    name: Build
    needs: [init, changes]
    if: >-
      always() &&
      needs.init.result == 'success' &&
      github.event_name != 'schedule' &&
      (github.event_name != 'pull_request' || needs.changes.outputs.code == 'true')
    uses: ./.github/workflows/_build.yaml
    permissions:
      contents: read
      packages: write
    with:
      full_version: ${{ needs.init.outputs.full_server_version }}
      build_hash: ${{ needs.init.outputs.build_hash }}
      build_stamp: ${{ needs.init.outputs.build_stamp }}
    secrets: inherit

  # ---------------------------------------------------------------------------
  #  Build passthrough — when build is skipped (docs-only PRs), report success
  #  under the same check names so branch protection required checks pass.
  # ---------------------------------------------------------------------------
  build-skip:
    name: Build / ${{ matrix.label }}
    needs: [init, changes]
    if: >-
      always() &&
      needs.init.result == 'success' &&
      github.event_name == 'pull_request' &&
      needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - label: Ubuntu 22.04
          - label: Windows Server 2022
          - label: macOS (ARM64)
    steps:
      - run: echo "Build skipped — no code changes detected"

  # ---------------------------------------------------------------------------
  #  CodeQL — scheduled + push only (not on PRs to avoid blocking releases)
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL / ${{ matrix.language }}
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          category: '/language:${{ matrix.language }}'

  codeql-cpp:
    name: CodeQL / cpp
    if: github.event_name == 'schedule'
    needs: init
    uses: ./.github/workflows/_build.yaml
    permissions:
      contents: read
      packages: write
      security-events: write
    with:
      codeql: true
      full_version: ${{ needs.init.outputs.full_server_version }}
      build_hash: ${{ needs.init.outputs.build_hash }}
      build_stamp: ${{ needs.init.outputs.build_stamp }}
      nodownload: true
    secrets: inherit

  # ---------------------------------------------------------------------------
  #  Container scan
  # ---------------------------------------------------------------------------
  container-scan:
    name: Container scan / ${{ matrix.dockerfile }}
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - Dockerfile.engine
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy (filesystem scan)
        run: |
          trivy fs docker/${{ matrix.dockerfile }} \
            --format sarif \
            --output trivy-${{ matrix.dockerfile }}.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.dockerfile }}.sarif'
          category: 'trivy-${{ matrix.dockerfile }}'

  # ---------------------------------------------------------------------------
  #  Gatekeeper — the ONLY job to mark as "Required" in branch protection.
  #  Aggregates all CI results so skipped builds don't block PRs.
  # ---------------------------------------------------------------------------
  ci-ok:
    name: CI OK
    needs: [init, changes, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ One or more CI jobs failed or were cancelled."
            echo "Results: init=${{ needs.init.result }}, changes=${{ needs.changes.result }}, build=${{ needs.build.result }}"
            exit 1
          fi
          echo "✅ All CI checks passed (or were correctly skipped)."
          echo "Results: init=${{ needs.init.result }}, changes=${{ needs.changes.result }}, build=${{ needs.build.result }}"
