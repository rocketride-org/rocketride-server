name: CI
run-name: ${{ github.event.pull_request.title || github.event.head_commit.message }} ${{ (github.event_name == 'workflow_dispatch' && github.ref_name) || '' }} ${{ github.event_name == 'merge_group' && 'merge queue' || '' }}

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [develop, main, 'release/**']
  pull_request:
    branches: [develop, main, 'release/**']
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: '17 4 * * 1' # Weekly Monday 4:17 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  GH_TOKEN: ${{ github.token }}
  VCPKG_NUGET_USER: ${{ github.repository_owner }}
  NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite

# ---------------------------------------------------------------------------
#  Build
# ---------------------------------------------------------------------------
jobs:
  init:
    name: Initialize
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up variables
        id: vars
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "FULL_VERSION=$VERSION.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "BUILD_HASH=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "BUILD_STAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT
    outputs:
      FULL_VERSION: ${{ steps.vars.outputs.FULL_VERSION }}
      BUILD_HASH: ${{ steps.vars.outputs.BUILD_HASH }}
      BUILD_STAMP: ${{ steps.vars.outputs.BUILD_STAMP }}

  build:
    name: Build / ${{ matrix.label }}
    needs: init
    if: github.event_name != 'schedule'
    timeout-minutes: 90
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            label: Ubuntu 22.04
            runner: ubuntu-22.04
            builder_cmd: ./builder
            vcpkg_cmd: ./build/vcpkg/vcpkg
          - platform: windows
            label: Windows Server 2022
            runner: windows-2022
            builder_cmd: ./builder.cmd
            vcpkg_cmd: ./build/vcpkg/vcpkg.exe
          - platform: macos
            label: macOS (ARM64)
            runner: macos-14
            builder_cmd: ./builder
            vcpkg_cmd: ./build/vcpkg/vcpkg
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
      - name: Set up pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10
      - name: Set up vcpkg
        run: ${{ matrix.builder_cmd }} vcpkg:submodule-build
      - name: Configure vcpkg NuGet credentials
        shell: bash
        run: |
          # Write NuGet config directly instead of using 'nuget sources add
          # -StorePasswordInClearText' which exposes the token in process
          # arguments and stores it in plaintext in the config file.
          if [ "$RUNNER_OS" = "Windows" ]; then
            NUGET_DIR="$APPDATA/NuGet"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            NUGET_DIR="$HOME/.config/NuGet"
          else
            NUGET_DIR="$HOME/.config/NuGet"
          fi
          mkdir -p "$NUGET_DIR"
          cat > "$NUGET_DIR/NuGet.Config" <<NUGETEOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="GitHubPackages" value="${NUGET_FEED_URL}" />
            </packageSources>
            <packageSourceCredentials>
              <GitHubPackages>
                <add key="Username" value="${VCPKG_NUGET_USER}" />
                <add key="ClearTextPassword" value="${NUGET_TOKEN}" />
              </GitHubPackages>
            </packageSourceCredentials>
          </configuration>
          NUGETEOF
          chmod 600 "$NUGET_DIR/NuGet.Config"
        env:
          NUGET_FEED_URL: ${{ env.NUGET_FEED_URL }}
          VCPKG_NUGET_USER: ${{ env.VCPKG_NUGET_USER }}
          NUGET_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: |
          ${{ matrix.builder_cmd }} build --verbose --autoinstall --version=${{ needs.init.outputs.FULL_VERSION }} --hash=${{ needs.init.outputs.BUILD_HASH }} --stamp=${{ needs.init.outputs.BUILD_STAMP }}

      - name: Test
        run: ${{ matrix.builder_cmd }} test --verbose

  # ---------------------------------------------------------------------------
  #  CodeQL — scheduled + push only (not on PRs to avoid blocking releases)
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL / ${{ matrix.language }}
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          category: '/language:${{ matrix.language }}'

  codeql-cpp:
    name: CodeQL / cpp
    if: github.event_name == 'schedule'
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    continue-on-error: true
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      VCPKG_NUGET_USER: ${{ github.repository_owner }}
      NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
      VCPKG_BINARY_SOURCES: clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10

      - name: Bootstrap vcpkg
        run: ./builder vcpkg:build

      - name: Configure vcpkg NuGet credentials
        run: |
          NUGET_DIR="$HOME/.config/NuGet"
          mkdir -p "$NUGET_DIR"
          cat > "$NUGET_DIR/NuGet.Config" <<NUGETEOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="GitHubPackages" value="${NUGET_FEED_URL}" />
            </packageSources>
            <packageSourceCredentials>
              <GitHubPackages>
                <add key="Username" value="${VCPKG_NUGET_USER}" />
                <add key="ClearTextPassword" value="${NUGET_TOKEN}" />
              </GitHubPackages>
            </packageSourceCredentials>
          </configuration>
          NUGETEOF
          chmod 600 "$NUGET_DIR/NuGet.Config"
        env:
          NUGET_FEED_URL: ${{ env.NUGET_FEED_URL }}
          VCPKG_NUGET_USER: ${{ env.VCPKG_NUGET_USER }}
          NUGET_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          languages: cpp
          build-mode: manual
          queries: security-and-quality

      - name: Skip prebuilt download
        run: |
          mkdir -p build
          echo '{"server":{"compiledVersion":"codeql"}}' > build/state.json

      - name: Build C++
        run: ./builder server:build --verbose --autoinstall

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        with:
          category: '/language:cpp'

  # ---------------------------------------------------------------------------
  #  Container scan
  # ---------------------------------------------------------------------------
  container-scan:
    name: Container scan / ${{ matrix.dockerfile }}
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - Dockerfile.engine
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy (filesystem scan)
        run: |
          trivy fs docker/${{ matrix.dockerfile }} \
            --format sarif \
            --output trivy-${{ matrix.dockerfile }}.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@ae9ef3a1d2e3413523c3741725c30064970cc0d4 # v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.dockerfile }}.sarif'
          category: 'trivy-${{ matrix.dockerfile }}'
