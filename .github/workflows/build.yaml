name: Build server
run-name: ${{ github.event.pull_request.title || github.event.head_commit.message }} ${{ (github.event_name == 'workflow_dispatch' && github.ref_name) || '' }} ${{ github.event_name == 'merge_group' && 'merge queue' || '' }}

concurrency:
  group: ${{ github.head_ref || github.run_id }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  actions: read
  checks: read
  contents: read
  packages: write
  pull-requests: write
  repository-projects: read
  security-events: read
  statuses: read

env:
  GH_TOKEN: ${{ github.token }}
  VCPKG_NUGET_USER: ${{ github.repository_owner }}
  NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

on:
  push:
    branches:
      - develop
      - 'release/**'
  pull_request:
    branches:
      - develop
      - 'release/**'
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release'
        default: 'draft'
        type: choice
        options:
          - draft
          - prerelease
          - release
      release_server:
        description: 'Release Server'
        required: false
        default: false
        type: boolean
      release_vscode:
        description: 'Release VS Code extension'
        required: false
        default: false
        type: boolean

jobs:
  init:
    name: Initialize variables
    runs-on: ubuntu-latest
    outputs:
      release_type: ${{ steps.init.outputs.release_type }}
      release_server: ${{ steps.init.outputs.release_server }}
      server_version: ${{ steps.init.outputs.server_version }}
      server_version_full: ${{ steps.init.outputs.server_version_full }}
      server_tag: ${{ steps.init.outputs.server_tag }}
      release_vscode: ${{ steps.init.outputs.release_vscode }}
      vscode_version: ${{ steps.init.outputs.vscode_version }}
      vscode_version_full: ${{ steps.init.outputs.vscode_version_full }}
      vscode_tag: ${{ steps.init.outputs.vscode_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up versions
        id: init
        run: |
          server_version="$(jq -r '.version' ${{ github.workspace }}/package.json)"
          vscode_version="$(jq -r '.version' ${{ github.workspace }}/apps/vscode/package.json)"

          echo "release_type=${{ inputs.release_type }}"                        >> $GITHUB_OUTPUT
          echo "release_server=${{ inputs.release_server }}"                    >> $GITHUB_OUTPUT
          echo "server_version=${server_version}"                               >> $GITHUB_OUTPUT
          echo "server_version_full=${server_version}.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "server_tag=server-v${server_version}"                           >> $GITHUB_OUTPUT
          echo "release_vscode=${{ inputs.release_vscode }}"                    >> $GITHUB_OUTPUT
          echo "vscode_version=${vscode_version}"                               >> $GITHUB_OUTPUT
          echo "vscode_version_full=${vscode_version}.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "vscode_tag=vscode-v${vscode_version}"                           >> $GITHUB_OUTPUT

          cat $GITHUB_OUTPUT

  build:
    name: Build / ${{ matrix.label }}
    needs: init
    timeout-minutes: 90
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            label: Ubuntu 22.04
            runner: ubuntu-22.04
            builder_cmd: ./builder
            vcpkg_cmd: ./build/vcpkg/vcpkg
          - platform: windows
            label: Windows Server 2022
            runner: windows-2022
            builder_cmd: ./builder.cmd
            vcpkg_cmd: ./build/vcpkg/vcpkg.exe
          - platform: macos
            label: macOS (ARM64)
            runner: macos-14
            builder_cmd: ./builder
            vcpkg_cmd: ./build/vcpkg/vcpkg
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up vcpkg
        run: ${{ matrix.builder_cmd }} vcpkg:build
      - name: Set up vcpkg nuget / Linux/macOS
        if: matrix.platform != 'windows'
        run: |
          NUGET_EXE=$(${{ matrix.vcpkg_cmd }} fetch nuget | tail -n1)
          mono $NUGET_EXE sources add \
            -Source "${{ env.NUGET_FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "${{ env.VCPKG_NUGET_USER }}" \
            -Password "${{ secrets.GITHUB_TOKEN }}" || true
          mono $NUGET_EXE setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.NUGET_FEED_URL }}"
      - name: Set up vcpkg nuget / Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $NUGET_EXE = $(${{ matrix.vcpkg_cmd }} fetch nuget | Select-Object -Last 1)
          & $NUGET_EXE sources add `
            -Source "${{ env.NUGET_FEED_URL }}" `
            -StorePasswordInClearText `
            -Name GitHubPackages `
            -UserName "${{ env.VCPKG_NUGET_USER }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}"
          & $NUGET_EXE setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source "${{ env.NUGET_FEED_URL }}"

      - name: Build
        run: ${{ matrix.builder_cmd }} build --verbose --autoinstall

      - name: Package
        if: github.event_name == 'workflow_dispatch' && inputs.release_server
        run: ${{ matrix.builder_cmd }} package --verbose

      - name: Test
        run: ${{ matrix.builder_cmd }} test --verbose

      - name: Upload Server artifacts
        if: github.event_name == 'workflow_dispatch' &&
            inputs.release_server
        uses: actions/upload-artifact@v4
        with:
          name: server-artifacts-${{ matrix.platform }}
          path: |
            ${{ github.workspace }}/dist/artifacts/*.zip
            ${{ github.workspace }}/dist/artifacts/*.tar.gz
          if-no-files-found: error

      - name: Upload VC Code extension artifacts
        if: github.event_name == 'workflow_dispatch' &&
            inputs.release_vscode &&
            matrix.platform == 'ubuntu'
        uses: actions/upload-artifact@v4
        with:
          name: vscode-artifacts-${{ matrix.platform }}
          path: |
            ${{ github.workspace }}/dist/vscode/*.vsix
          if-no-files-found: error

  release:
    name: Release / ${{ matrix.name }}
    needs: [init, build]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: server
            name: Server
            version: ${{ needs.init.outputs.server_version }}
            should_release: ${{ needs.init.outputs.release_server }}
            tag_name: ${{ needs.init.outputs.server_tag }}
            download_pattern: server-artifacts-*
          - type: vscode
            name: VS Code Extension
            version: ${{ needs.init.outputs.vscode_version }}
            should_release: ${{ needs.init.outputs.release_vscode }}
            tag_name: ${{ needs.init.outputs.vscode_tag }}
            download_pattern: vscode-artifacts-*
    steps:
      - name: Check out repository
        if: matrix.should_release == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        if: matrix.should_release == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.download_pattern }}
          merge-multiple: true
          path: release-assets

      - name: Verify artifacts
        if: matrix.should_release == 'true'
        run: ls -la release-assets

      - name: Create tag
        if: matrix.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ matrix.tag_name }}"
          git push origin "${{ matrix.tag_name }}"

      - name: Create release and upload artifacts
        if: matrix.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.tag_name }}
          name: RocketRide ${{ matrix.name }} v${{ matrix.version }}
          generate_release_notes: true
          draft: ${{ needs.init.outputs.release_type == 'draft' }}
          prerelease: ${{ needs.init.outputs.release_type == 'prerelease' }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
