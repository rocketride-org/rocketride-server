      #     tag_name: server-v${{ needs.init.outputs.version }}
      #     name: RocketRide Server v${{ needs.init.outputs.version }}
      #     generate_release_notes: true
      #     draft: ${{ inputs.release_type == 'draft' }}
      #     prerelease: ${{ inputs.release_type == 'prerelease' }}
