name: Release

# Default least-privilege permissions for the workflow. Individual
# release jobs below raise to write where they actually need it
# (tag pushes, GitHub releases, package publishing).
# Closes Scorecard TokenPermissionsID #516.
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out (branch, tag, or sha). Empty uses the default.
        required: false
        type: string
        default: ''
      prerelease:
        description: Create a prerelease (skips registry publishing, force-pushes tags)
        required: false
        type: boolean
        default: false
      environment:
        description: GitHub deployment environment name (leave empty to skip)
        required: false
        type: string
        default: ''
      server_version:
        required: true
        type: string
      vscode_version:
        required: true
        type: string
      client_mcp_version:
        required: true
        type: string
      client_python_version:
        required: true
        type: string
      client_typescript_version:
        required: true
        type: string

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: server
            name: Server
            version: ${{ inputs.server_version }}
            tag_name: server-v${{ inputs.server_version }}${{ inputs.prerelease && '-prerelease' || '' }}
            download_pattern: server-artifacts-*
          - type: client-typescript
            name: TypeScript Client
            version: ${{ inputs.client_typescript_version }}
            tag_name: client-typescript-v${{ inputs.client_typescript_version }}${{ inputs.prerelease && '-prerelease' || '' }}
            download_pattern: typescript-client-artifacts
          - type: client-python
            name: Python Client
            version: ${{ inputs.client_python_version }}
            tag_name: client-python-v${{ inputs.client_python_version }}${{ inputs.prerelease && '-prerelease' || '' }}
            download_pattern: python-client-artifacts
          - type: client-mcp
            name: MCP Client
            version: ${{ inputs.client_mcp_version }}
            tag_name: client-mcp-v${{ inputs.client_mcp_version }}${{ inputs.prerelease && '-prerelease' || '' }}
            download_pattern: mcp-client-artifacts
          - type: vscode
            name: VS Code Extension
            version: ${{ inputs.vscode_version }}
            tag_name: vscode-v${{ inputs.vscode_version }}${{ inputs.prerelease && '-prerelease' || '' }}
            download_pattern: vscode-artifacts
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: ${{ inputs.prerelease && 1 || 0 }}

      - name: Check if tag exists
        id: tag_check
        if: inputs.prerelease == false
        run: |
          if git rev-parse "${{ matrix.tag_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ matrix.tag_name }} already exists — skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download artifacts
        if: inputs.prerelease || steps.tag_check.outputs.exists == 'false'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: ${{ matrix.download_pattern }}
          merge-multiple: true
          path: release-assets

      - name: List artifacts
        if: inputs.prerelease || steps.tag_check.outputs.exists == 'false'
        run: find release-assets -type f | sort

      # --- GPG-sign server tarballs/zips ---
      #
      # Produces detached ASCII-armored signatures (.asc) attached to the
      # GitHub release alongside the originals. Skips cleanly when the
      # signing secrets aren't configured, so this is safe to merge before
      # key generation.
      #
      # User verification:
      #   gpg --verify rocketride-server-X.Y.Z-linux-x64.tar.gz.asc \
      #                rocketride-server-X.Y.Z-linux-x64.tar.gz
      #
      # One-time setup:
      #   1. Generate a dedicated release-signing key (offline, on a trusted machine):
      #        gpg --quick-generate-key 'RocketRide Releases <releases@rocketride.ai>' ed25519 sign 2y
      #   2. Export the private key and store as repo secret GPG_SIGNING_KEY:
      #        gpg --armor --export-secret-keys releases@rocketride.ai
      #   3. Store the key passphrase as repo secret GPG_SIGNING_PASSPHRASE.
      #   4. Publish the public key for users:
      #        gpg --armor --export releases@rocketride.ai > scripts/release-pubkey.asc
      #      Commit it; also upload to keys.openpgp.org and add the
      #      fingerprint to README/SECURITY.md.
      - name: Check GPG signing availability
        id: gpg_check
        if: matrix.type == 'server' && (inputs.prerelease || steps.tag_check.outputs.exists == 'false')
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: |
          # Require BOTH secrets — the signing step pipes the passphrase to
          # gpg via --passphrase-fd 0, so a key-only setup would hard-fail
          # at sign time. Skip cleanly on partial setup; surface which
          # secret is missing for faster debugging.
          if [ -n "${GPG_SIGNING_KEY:-}" ] && [ -n "${GPG_SIGNING_PASSPHRASE:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            missing=()
            [ -z "${GPG_SIGNING_KEY:-}" ] && missing+=("GPG_SIGNING_KEY")
            [ -z "${GPG_SIGNING_PASSPHRASE:-}" ] && missing+=("GPG_SIGNING_PASSPHRASE")
            echo "::warning::Missing secret(s): ${missing[*]} — server tarballs will be released unsigned"
          fi

      - name: GPG-sign server artifacts
        if: matrix.type == 'server' && (inputs.prerelease || steps.tag_check.outputs.exists == 'false') && steps.gpg_check.outputs.available == 'true'
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          echo "Signing with key ${KEY_ID}"
          shopt -s nullglob
          # Fail loudly if invoked with no input — reaching this step
          # means both secrets are configured, so signing is expected
          # to happen. Silent no-ops here would ship the release
          # unsigned without any warning.
          files=(release-assets/*.tar.gz release-assets/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No server archives (.tar.gz/.zip) found in release-assets/ to sign"
            ls -la release-assets/ || true
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "$GPG_SIGNING_PASSPHRASE" | gpg --batch --yes \
              --pinentry-mode loopback --passphrase-fd 0 \
              --local-user "$KEY_ID" \
              --detach-sign --armor \
              --output "${f}.asc" "$f"
            echo "Signed ${f} -> ${f}.asc"
          done
          ls -la release-assets/

      # --- npm: rocketride ---
      - name: Set up Node.js
        if: inputs.prerelease == false && steps.tag_check.outputs.exists == 'false' && matrix.type == 'client-typescript'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: inputs.prerelease == false && steps.tag_check.outputs.exists == 'false' && matrix.type == 'client-typescript'
        run: |
          VERSION="${{ matrix.version }}"
          if npm view "rocketride@${VERSION}" version 2>/dev/null; then
            echo "rocketride@${VERSION} already exists on npm — skipping"
          else
            TARBALL=$(find release-assets -name '*.tgz' | head -n1)
            echo "Publishing ${TARBALL}"
            npm publish "./${TARBALL}" --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- PyPI ---
      - name: Set up Python
        if: inputs.prerelease == false && steps.tag_check.outputs.exists == 'false' && (matrix.type == 'client-python' || matrix.type == 'client-mcp')
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Publish rocketride to PyPI
        if: inputs.prerelease == false && steps.tag_check.outputs.exists == 'false' && matrix.type == 'client-python'
        run: |
          pip install twine==6.1.0
          VERSION="${{ matrix.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/rocketride/${VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "rocketride==${VERSION} already exists on PyPI — skipping"
          else
            twine upload release-assets/*.whl release-assets/*.tar.gz
          fi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Publish rocketride-mcp to PyPI
        if: inputs.prerelease == false && steps.tag_check.outputs.exists == 'false' && matrix.type == 'client-mcp'
        run: |
          pip install twine==6.1.0
          VERSION="${{ matrix.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/rocketride-mcp/${VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "rocketride-mcp==${VERSION} already exists on PyPI — skipping"
          else
            twine upload release-assets/*.whl release-assets/*.tar.gz
          fi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      # --- VS Code Marketplace + Open VSX ---
      - name: Set up Node.js for vsce
        if: inputs.prerelease == false && steps.tag_check.outputs.exists == 'false' && matrix.type == 'vscode'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Publish to VS Code Marketplace
        if: inputs.prerelease == false && steps.tag_check.outputs.exists == 'false' && matrix.type == 'vscode'
        run: |
          npm install -g @vscode/vsce@3.7.1
          VSIX=$(find release-assets -name '*.vsix' | head -n1)
          echo "Publishing ${VSIX}"
          OUTPUT=$(vsce publish --packagePath "${VSIX}" 2>&1) && exit 0
          if echo "$OUTPUT" | grep -qi "already exists"; then
            echo "Version already exists on Marketplace — skipping"
          else
            echo "$OUTPUT"
            exit 1
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: inputs.prerelease == false && steps.tag_check.outputs.exists == 'false' && matrix.type == 'vscode'
        run: |
          npm install -g ovsx@0.10.9
          VSIX=$(find release-assets -name '*.vsix' | head -n1)
          echo "Publishing ${VSIX}"
          OUTPUT=$(ovsx publish "${VSIX}" -p "$OVSX_PAT" 2>&1) && exit 0
          if echo "$OUTPUT" | grep -qiE "already exists|already published"; then
            echo "Version already exists on Open VSX — skipping"
          else
            echo "$OUTPUT"
            exit 1
          fi
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      # --- Tag and GitHub Release ---
      #
      # IMPORTANT: tag push uses WORKFLOW_PAT (a Personal Access Token with
      # `repo` + `workflow` scopes) instead of the default GITHUB_TOKEN.
      #
      # GitHub rejects any tag push from GITHUB_TOKEN whose target commit
      # modifies files under `.github/workflows/`, with the error:
      #
      #   refusing to allow a GitHub App to create or update workflow
      #   `.github/workflows/<file>` without `workflows` permission
      #
      # `workflows` is a token-level scope, not a YAML permission, so the
      # only fix is to swap to a credential that has it. WORKFLOW_PAT is
      # that credential. Without this, every nightly that lands on a
      # workflow-touching commit silently bricks the prerelease pipeline:
      # the cleanup job runs first and deletes existing -prerelease tags,
      # then all 5 prerelease creation jobs fail to push the new ones,
      # leaving the repo with zero prereleases until the next clean
      # commit.
      - name: Create tag
        if: inputs.prerelease || steps.tag_check.outputs.exists == 'false'
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Swap the remote URL to authenticate with WORKFLOW_PAT for the
          # push. This affects only this step's git config and goes away
          # when the runner tears down.
          git remote set-url origin "https://x-access-token:${WORKFLOW_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            git tag -f "${{ matrix.tag_name }}"
            git push -f origin "${{ matrix.tag_name }}"
          else
            git tag "${{ matrix.tag_name }}"
            git push origin "${{ matrix.tag_name }}"
          fi

      - name: Set release body
        id: release_body
        if: inputs.prerelease
        run: |
          {
            echo 'body<<RELEASE_BODY'
            echo "Automated nightly prerelease from \`${{ github.ref_name }}\`."
            echo ""
            echo "**${{ matrix.name }}** v${{ matrix.version }}"
            echo 'RELEASE_BODY'
          } >> $GITHUB_OUTPUT

      - name: Create GitHub release
        if: inputs.prerelease || steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ matrix.tag_name }}
          name: RocketRide ${{ matrix.name }} v${{ matrix.version }}${{ inputs.prerelease && ' (prerelease)' || '' }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: ${{ inputs.prerelease == false }}
          body: ${{ steps.release_body.outputs.body }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
