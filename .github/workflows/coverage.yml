name: Code Coverage

on:
  pull_request:
  push:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  coverage:
    name: Python coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install node dependencies if requirements exist
          if [ -f nodes/requirements.txt ]; then pip install -r nodes/requirements.txt; fi
          if [ -f packages/ai/requirements.txt ]; then pip install -r packages/ai/requirements.txt; fi
          # Install packages in editable mode for coverage tracking
          if [ -f nodes/setup.py ] || [ -f nodes/pyproject.toml ]; then pip install -e nodes/ 2>/dev/null || true; fi
          if [ -f packages/ai/setup.py ] || [ -f packages/ai/pyproject.toml ]; then pip install -e packages/ai/ 2>/dev/null || true; fi

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=nodes \
            --cov=packages \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=junit.xml \
            -q \
            nodes/test/ test/ \
            || true  # Don't fail the workflow if some tests fail — coverage still uploads

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
