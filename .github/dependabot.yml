version: 2

updates:
  # npm — all JS/TS packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
      npm-major:
        update-types:
          - "major"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"
    groups:
      actions-all:
        patterns:
          - "*"

  # Docker
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"

  # Maven — Tika
  - package-ecosystem: "maven"
    directory: "/packages/tika/lib/dbgconn"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"
    groups:
      maven-all:
        patterns:
          - "*"

  # pip — pipeline nodes
  - package-ecosystem: "pip"
    directories:
      - "/nodes/src/nodes"
      - "/nodes/src/nodes/anonymize"
      - "/nodes/src/nodes/astra_db"
      - "/nodes/src/nodes/atlas"
      - "/nodes/src/nodes/audio_player"
      - "/nodes/src/nodes/audio_transcribe"
      - "/nodes/src/nodes/chroma"
      - "/nodes/src/nodes/db_mysql"
      - "/nodes/src/nodes/dictionary"
      - "/nodes/src/nodes/embedding_image"
      - "/nodes/src/nodes/embedding_openai"
      - "/nodes/src/nodes/embedding_transformer"
      - "/nodes/src/nodes/extract_data"
      - "/nodes/src/nodes/frame_grabber"
      - "/nodes/src/nodes/image_cleanup"
      - "/nodes/src/nodes/index_search"
      - "/nodes/src/nodes/llamaparse"
      - "/nodes/src/nodes/llm_anthropic"
      - "/nodes/src/nodes/llm_bedrock"
      - "/nodes/src/nodes/llm_deepseek"
      - "/nodes/src/nodes/llm_gemini"
      - "/nodes/src/nodes/llm_mistral"
      - "/nodes/src/nodes/llm_ollama"
      - "/nodes/src/nodes/llm_openai"
      - "/nodes/src/nodes/llm_perplexity"
      - "/nodes/src/nodes/llm_vertex"
      - "/nodes/src/nodes/llm_vision_mistral"
      - "/nodes/src/nodes/llm_xai"
      - "/nodes/src/nodes/local_text_output"
      - "/nodes/src/nodes/milvus"
      - "/nodes/src/nodes/ner"
      - "/nodes/src/nodes/ocr"
      - "/nodes/src/nodes/pinecone"
      - "/nodes/src/nodes/preprocessor_code"
      - "/nodes/src/nodes/preprocessor_langchain"
      - "/nodes/src/nodes/preprocessor_llm"
      - "/nodes/src/nodes/qdrant"
      - "/nodes/src/nodes/question"
      - "/nodes/src/nodes/reducto"
      - "/nodes/src/nodes/remote"
      - "/nodes/src/nodes/response"
      - "/nodes/src/nodes/summarization"
      - "/nodes/src/nodes/text_output"
      - "/nodes/src/nodes/thumbnail"
      - "/nodes/src/nodes/vectordb_postgres"
      - "/nodes/src/nodes/vectorizer"
      - "/nodes/src/nodes/weaviate"
      - "/nodes/src/nodes/webhook"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"
    groups:
      nodes-minor-patch:
        update-types:
          - "minor"
          - "patch"
      nodes-major:
        update-types:
          - "major"

  # pip — AI modules
  - package-ecosystem: "pip"
    directories:
      - "/packages/ai/src/ai"
      - "/packages/ai/src/ai/account"
      - "/packages/ai/src/ai/common"
      - "/packages/ai/src/ai/common/avi"
      - "/packages/ai/src/ai/common/image"
      - "/packages/ai/src/ai/common/torch"
      - "/packages/ai/src/ai/modules/task"
      - "/packages/ai/src/ai/web"
      - "/packages/ai/tests"
