  <defs>
    <!-- Background gradient: Abyss Blue -> Imperial Indigo -> Night Amethyst -->
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1a34"/>
      <stop offset="45%" stop-color="#370b7a"/>
      <stop offset="100%" stop-color="#5f2167"/>
    </linearGradient>
    <!-- Star shimmer -->
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Horizon Blue glow for the logo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#41b6e6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#41b6e6" stop-opacity="0"/>
    </radialGradient>
    <!-- Nebula clouds -->
    <radialGradient id="nebula1" cx="25%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#5f2167" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5f2167" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="35%" r="35%">
      <stop offset="0%" stop-color="#41b6e6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#41b6e6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="55%" cy="70%" r="30%">
      <stop offset="0%" stop-color="#370b7a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#370b7a" stop-opacity="0"/>
    </radialGradient>
    <!-- Central glow behind title -->
    <radialGradient id="centerGlow" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#41b6e6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#41b6e6" stop-opacity="0"/>
    </radialGradient>
  </defs>

