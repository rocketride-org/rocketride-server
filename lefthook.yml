pre-commit:
  parallel: true
  commands:
    gitleaks:
      tags: security
      run: "if command -v gitleaks >/dev/null 2>&1; then gitleaks protect --verbose --staged --config .gitleaks.toml; else echo 'gitleaks not installed - skipping secret scan'; fi"
    eslint:
      glob: '*.{js,ts,jsx,tsx,mjs,cjs}'
      run: npx eslint {staged_files}
    prettier:
      glob: '*.{js,ts,jsx,tsx,mjs,cjs,json,css,scss,html,md,yaml,yml}'
      run: npx prettier --check {staged_files}
    ruff-check:
      glob: '*.py'
      run: ruff check {staged_files}
    ruff-format:
      glob: '*.py'
      run: ruff format --check {staged_files}
